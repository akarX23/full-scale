version: "3.9"

services:
  inference-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecs-inference-server
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      SERVED_MODEL: lenet
      MODEL_TYPE: dense
      MODEL_DIR: /app/models
      DATA_DIR: /app/data
      IGNORE_DEVICES: ""
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
